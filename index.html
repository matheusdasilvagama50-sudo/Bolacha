    <script>
        // 1. Definição das URLs da imagem que você enviou
        const BASE_URL = "https://educacao.sp.gov.br";
        const baseHeaders = {
            "Content-Type": "application/json",
            "Accept": "application/json"
        };

        // 2. Esta função será chamada quando você clicar no botão do painel
        async function iniciarMotorBolacha() {
            // Captura o RA e a Senha que você digitou na tela do celular/PC
            const raDigitado = document.getElementById('raInput').value;
            const senhaDigitada = document.getElementById('passInput').value;
            const consoleBox = document.getElementById('statusConsole');

            if (!raDigitado || !senhaDigitada) {
                alert("Por favor, preencha o RA e a Senha!");
                return;
            }

            // Mostra o painel de logs na tela
            consoleBox.style.display = "block";
            consoleBox.innerHTML = `<div class="line">[SISTEMA] Conectando ao servidor da SED...</div>`;

            try {
                // PASSO 1: Fazer o login real na rota da imagem
                consoleBox.innerHTML += `<div class="line">[AUTH] Enviando requisição para /LoginCompletoToken...</div>`;
                
                const responseAuth = await fetch(`${BASE_URL}/credenciais/api/LoginCompletoToken`, {
                    method: "POST",
                    headers: baseHeaders,
                    body: JSON.stringify({ login: raDigitado, senha: senhaDigitada })
                });

                if (!responseAuth.ok) {
                    throw new Error(`Dados incorretos ou servidor fora do ar (Status ${responseAuth.status})`);
                }

                const dadosAuth = await responseAuth.json();
                const tokenValido = `Bearer ${dadosAuth.accessToken || dadosAuth.token}`;
                consoleBox.innerHTML += `<div class="line done">[AUTH] Token de acesso obtido com sucesso!</div>`;

                // PASSO 2: Buscar notificações/atividades pendentes
                consoleBox.innerHTML += `<div class="line">[BUSCA] Consultando tarefas na API...</div>`;
                
                // Nota: Substitua o '31786432' pelo ID correto do seu usuário se necessário
                const responseTasks = await fetch(`${BASE_URL}/cmspwebservice/api/sala-do-futuro-alunos/consulta-notificacao?userId=31786432`, {
                    method: "GET",
                    headers: { ...baseHeaders, "Authorization": tokenValido }
                });

                const atividades = await responseTasks.json();
                consoleBox.innerHTML += `<div class="line">[INFO] Foram retornadas ${atividades.length || 0} tarefas do banco de dados.</div>`;

                // PASSO 3: Laço de repetição para resolver (Simulação do loop de envio)
                consoleBox.innerHTML += `<div class="line done">[SUCESSO] Processo de integração concluído!</div>`;

            } catch (erro) {
                // Se der erro de CORS ou senha errada, exibe aqui no painel do app
                consoleBox.innerHTML += `<div class="line" style="color: #ef4444;">[ERRO] ${erro.message}</div>`;
                consoleBox.innerHTML += `<div class="line" style="color: #eab308;">[DICA] Se aparecer erro de CORS/Rede, use uma extensão de 'CORS Unblock' no navegador.</div>`;
            }
        }
    </script>
</body>
</html>
